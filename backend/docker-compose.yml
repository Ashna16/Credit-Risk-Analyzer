services:
  db:
    image: postgres:15
    container_name: credit_analyzer_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Host 5433 avoids clashing with Postgres.app (or another local Postgres on 5432).
    # TablePlus / GUI: 127.0.0.1:5433  —  Inside Compose, services still use hostname "db" port 5432.
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - uploads_data:/shared_uploads
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: python:3.11-slim
    container_name: credit_analyzer_api
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      UPLOAD_FOLDER: ./uploads
    volumes:
      - ./:/app
      - uploads_data:/app/uploads
    ports:
      - '8000:8000'
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  uploads_data:
